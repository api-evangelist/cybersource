name: CyberSource
description: >-
  CyberSource, a Visa solution, is a global payment management platform that
  enables businesses to accept payments online, in-app, and in-person. It
  provides REST APIs for payment authorization and processing, fraud management
  via Decision Manager, payment tokenization, recurring billing, payouts, and
  comprehensive post-transaction reporting. The platform operates across 190+
  countries and supports card-present, card-not-present, digital wallets,
  alternative payment methods, and buy-now-pay-later integrations.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/cybersource/refs/heads/main/apis.yml
version: '0.19'
modified: '2026-06-13'
created: '2026-06-13'
